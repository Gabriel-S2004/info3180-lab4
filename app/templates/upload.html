{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">File Upload</h1>

{% include 'flash_messages.html' %}

{# Add the appropriate method and enctype attributes to the form tag to allow for file uploads #}
<form method="POST" enctype="multipart/form-data">

    {{ form.csrf_token }}

  <div>
      {{ form.file.label }}
      {{ form.file() }}
  </div>

  <div>
      {{ form.submit() }}
  </div>

</form>
{% endblock %}
